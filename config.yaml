models:
  orchestrator: "deepseek/deepseek-v4-flash"
  sub_agents:   "openai/gpt-5-mini"
  verifier:     "openai/gpt-5-nano"
  implement:    "qwen/qwen3-coder"

peer_review:
  reviewers:
    - model: "google/gemini-2.5-flash-lite"
      perspective: "methodological_rigor"
      perspective_kr: "방법론 엄밀성"
    - model: "x-ai/grok-4.3"
      perspective: "novelty"
      perspective_kr: "창의성·혁신성"
    - model: "z-ai/glm-5.1"
      perspective: "practical_impact"
      perspective_kr: "실용성·영향력"

ntfy:
  # Docker 배포 시: NTFY_SERVER_URL=http://ntfy (내부 서비스명)
  # 로컬 테스트 시: NTFY_SERVER_URL=http://localhost:8080
  server_url: "http://localhost:8080"
  topic: "research-agent"
  # dashboard 모드: 승인은 UI 큐(무제한 대기)로 처리 → ntfy timeout 미사용
  # ntfy 단독 모드 fallback: NTFY_TIMEOUT 환경변수로 override (docker-compose: 86400)
  timeout_seconds: 86400
  default_on_timeout: "approve"

verifier:
  max_rounds: 3

mcp:
  file_manager:
    base_path: "./outputs"
  python_executor:
    timeout_seconds: 30
    allowed_path: "./outputs"
  web_search:
    max_results: 10
    sources:
      - "arxiv"
      - "semantic_scholar"

logging:
  token_tracking: true
  log_file: "./outputs/logs/token_usage.jsonl"
